<div class="well-sm" id="app"></div>

<script>
(function () {

  /* get URL query param */
  function getParam(name) {
    var qs   = window.location.search.substring(1);
    var vars = qs.split('&');
    for (var i = 0; i < vars.length; i++) {
      var pair = vars[i].split('=');
      if (decodeURIComponent(pair[0]) === name) {
        return decodeURIComponent((pair[1] || '').replace(/\+/g, ' '));
      }
    }
    return null;
  }

  /* find student by zsid */
  function findStudent(zsid) {
    for (var i = 0; i < STUDENTS.length; i++) {
      if (STUDENTS[i].zsid === zsid) return STUDENTS[i];
    }
    return null;
  }

  /* build HSK header columns */
  function hskHeaders(s) {
    var isHSK6 = (s["Test Type"] || "").indexOf("六级") !== -1;
    if (isHSK6) {
      return '<th><div align="center">听力</div></th>'
           + '<th><div align="center">阅读</div></th>'
           + '<th><div align="center">Total Score</div></th>';
    }
    return '<th><div align="center">听力</div></th>'
         + '<th><div align="center">阅读</div></th>'
         + '<th><div align="center">写作</div></th>'
         + '<th>\n\t\t\t\t\t\t\t<div align="center">\n\t\t\t\t\t\t\t\t\tTotal Score\n\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t\t</th>';
  }

  /* build HSK score cells */
  function hskScores(s) {
    var isHSK6 = (s["Test Type"] || "").indexOf("六级") !== -1;
    if (isHSK6) {
      return '<td align="center">\n\t\t\t\t\t\t\t' + s["HSK Listening"] + '\n\t\t\t\t\t\t</td>'
           + '\n\t\t\t\t\t\t<td align="center">\n\t\t\t\t\t\t\t' + s["HSK Reading"] + '\n\t\t\t\t\t\t</td>'
           + '\n\t\t\t\t\t\t<td align="center">\n\t\t\t\t\t\t\t' + s["HSK Total"] + '\n\t\t\t\t\t\t</td>';
    }
    return '<td align="center">\n\t\t\t\t\t\t\t' + s["HSK Listening"] + '\n\t\t\t\t\t\t</td>'
         + '\n\t\t\t\t\t\t\n\t\t\t\t\t\t<td align="center">\n\t\t\t\t\t\t\t' + s["HSK Reading"] + '\n\t\t\t\t\t\t</td>'
         + '\n\t\t\t\t\t\t\n\t\t\t\t\t\t<td align="center">\n\t\t\t\t\t\t\t' + s["HSK Writing"] + '\n\t\t\t\t\t\t</td>'
         + '\n\t\t\t\t\t\t\n\t\t\t\t\t\t<td align="center">\n\t\t\t\t\t\t\t' + s["HSK Total"] + '\n\t\t\t\t\t\t</td>';
  }

  /* render full student result — exact original markup */
  function renderStudent(s) {

    var photoCell = s["Photo"]
      ? '<img src="' + s["Photo"] + '" height="200px" onerror="this.style.display=\'none\'"\/>'
      : '';

    var hasHSKK = s["HSKK Level"] && s["HSKK Speaking"];

    var hskKBlock = '';
    if (hasHSKK) {
      hskKBlock = [
        '',
        '\t\t\t\t<div class="panel panel-default">',
        '\t\t\t\t\t<!-- Default panel contents -->',
        '\t\t\t\t\t<div class="panel-body">',
        '\t\t\t\t\t\tHSKK（' + s["HSKK Level"] + '）(' + s["Test Time"] + ')中文水平考试',
        '\t\t\t\t\t</div>',
        '\t\t\t\t\t<!-- Table -->',
        '\t\t\t\t\t<table class="table table-bordered">',
        '\t\t\t\t\t\t<thead>',
        '\t\t\t\t\t\t\t<tr class="active">',
        '\t\t\t\t\t\t\t\t<th><div align="center">口试</div></th>',
        '\t\t\t\t\t\t\t\t',
        '\t\t\t\t\t\t\t\t<th><div align="center">Total Score</div></th>',
        '',
        '\t\t\t\t\t\t\t\t<th><div align="center">Status</div></th>',
        '\t\t\t\t\t\t\t</tr>',
        '\t\t\t\t\t\t</thead>',
        '\t\t\t\t\t\t<tbody>',
        '\t\t\t\t\t\t\t<tr>',
        '\t\t\t\t\t\t\t\t<td align="center">',
        '\t\t\t\t\t\t\t\t\t' + s["HSKK Speaking"],
        '\t\t\t\t\t\t\t\t</td>',
        '\t\t\t\t\t\t\t\t',
        '\t\t\t\t\t\t\t\t<td align="center">' + s["HSKK Total"] + '</td>',
        '\t\t\t\t\t\t\t\t<td align="center">' + s["HSKK Status"] + '</td>',
        '\t\t\t\t\t\t\t</tr>',
        '\t\t\t\t\t\t</tbody>',
        '\t\t\t\t\t</table>',
        '\t\t\t\t</div>'
      ].join('\n');
    }

    var lines = [
      '<center>',
      '  <h2>中文考试成绩在线验证结果查询</h2>',
      '  <h4>汉考国际教育科技（北京）有限公司（CTI）</h4>',
      '</center>',
      '<div class="panel panel-default">',
      '\t<div class="well-lg" >',
      '\t\t<div class="panel panel-default">',
      '\t\t\t<!-- Default panel contents -->',
      '\t\t\t<div class="panel-body">',
      '\t\t\t\tInformation of test taker ',
      '\t\t\t</div>',
      '\t\t\t<!-- Table -->',
      '\t\t\t<table class="table table-bordered">',
      '\t\t\t\t<tbody>',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t<td class="active text-right">Name on Certificate </td>',
      '\t\t\t\t\t\t<td>' + s["Name on Certificate"] + '</td>',
      '\t\t\t\t\t\t<td rowspan="5" width="100px">',
      '\t\t\t\t\t\t\t' + photoCell,
      '\t\t\t\t\t\t</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t<td class="active text-right">Chinese Name</td>',
      '\t\t\t\t\t\t<td>' + s["Chinese Name"] + '</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t<td class="active text-right">Nationality</td>',
      '\t\t\t\t\t\t<td>' + s["Nationality"] + '</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t<td class="active text-right">Gender</td>',
      '\t\t\t\t\t\t<td>' + s["Gender"] + '</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t<td colspan="2" class="" style="font-size:14px;">考试信息</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t<td class="active text-right">考点名称</td>',
      '\t\t\t\t\t\t<td colspan="2">' + s["Exam Center"] + '</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t<td class="active text-right">Ticket No.</td>',
      '\t\t\t\t\t\t<td colspan="2">' + s["Ticket No."] + '</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t<td class="active text-right">证书编号</td>',
      '\t\t\t\t\t\t<td colspan="2"> ' + s["Certificate No."] + '</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t<td class="active text-right">Test Type</td>',
      '\t\t\t\t\t\t<td colspan="2">' + s["Test Type"] + '</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t\t',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t<td class="active text-right">Test Time</td>',
      '\t\t\t\t\t\t<td colspan="2">' + s["Test Time"] + '</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t</tbody>',
      '\t\t\t</table>',
      '\t\t</div>',
      '\t\t',
      '\t\t',
      '\t\t<div class="panel panel-default">',
      '\t\t\t<!-- Default panel contents -->',
      '\t\t\t<div class="panel-body">',
      '\t\t\t\t' + s["Test Type"] + '(' + s["Test Time"] + ')中文水平考试',
      '\t\t\t</div>',
      '\t\t\t<!-- Table -->',
      '\t\t\t<table class="table table-bordered">',
      '\t\t\t\t<thead>',
      '\t\t\t\t\t<tr class="active">\t\t\t\t\t\t\t',
      '\t\t\t\t\t\t\t' + hskHeaders(s),
      '\t\t\t\t\t</tr>',
      '\t\t\t\t</thead>',
      '\t\t\t\t<tbody>',
      '\t\t\t\t\t<tr>',
      '\t\t\t\t\t\t' + hskScores(s),
      '\t\t\t\t\t\t</td>',
      '\t\t\t\t\t</tr>',
      '\t\t\t\t</tbody>',
      '\t\t\t</table>',
      '\t\t\t',
      '\t\t</div>',
      '\t\t',
      '\t\t<!-- 越南才显示 或者 能关联上口语的才显示 flag 代表关联上成绩 180 越南-->',
      '\t\t',
      '\t\t',
      hskKBlock,
      '\t\t<center>',
      '\t \t\t\t<h6>最终解释权归汉考国际所有</h6>',
      '\t\t</center>',
      '\t\t',
      '\t</div>',
      '</div>'
    ];

    return lines.join('\n');
  }

  /* not found page — same header, error body */
  function renderNotFound(zsid) {
    return [
      '<center>',
      '  <h2>中文考试成绩在线验证结果查询</h2>',
      '  <h4>汉考国际教育科技（北京）有限公司（CTI）</h4>',
      '</center>',
      '<div class="panel panel-default">',
      '\t<div class="well-lg" style="text-align:center;padding:40px 24px;">',
      '\t\t<h3 style="color:#a94442;margin-bottom:16px;">未找到记录</h3>',
      '\t\t<p style="font-size:15px;color:#555;">No score record found for candidate ID: <strong>' + (zsid || '') + '</strong></p>',
      '\t\t<p style="font-size:13px;color:#999;">请确认准考证号是否正确 / Please verify the ID and try again.</p>',
      '\t</div>',
      '</div>'
    ].join('\n');
  }

  /* ── MAIN ── */
  var zsid    = getParam('zsid');
  var student = zsid ? findStudent(zsid) : null;
  var app     = document.getElementById('app');

  app.innerHTML = student ? renderStudent(student) : renderNotFound(zsid);

})();
</script>
