<script>
(function () {

  /* ── get URL query param ── */
  function getParam(name) {
    var qs   = window.location.search.substring(1);
    var vars = qs.split('&');
    for (var i = 0; i < vars.length; i++) {
      var pair = vars[i].split('=');
      if (decodeURIComponent(pair[0]) === name) {
        return decodeURIComponent((pair[1] || '').replace(/\+/g, ' '));
      }
    }
    return null;
  }

  /* ── find student by zsid ── */
  function findStudent(zsid) {
    for (var i = 0; i < STUDENTS.length; i++) {
      if (STUDENTS[i].zsid === zsid) return STUDENTS[i];
    }
    return null;
  }

  /* ── render full result — exact original markup ── */

    var photoCell = s['Photo']

      : '';

    var isHSK6 = (s['Test Type'] || '').indexOf('六级') !== -1;

    var hskTH, hskTD;

      hskTH = '<th><div align="center">听力</div></th>'

             + '\n\t\t\t\t\t\t\n\t\t\t\t\t\t<td align="center">\n\t\t\t\t\t\t\t' + s['HSK Total'] + '\n\t\t\t\t\t\t</td>';
    } else {
      hskTH = '<th><div align="center">听力</div></th>'
             + '<th><div align="center">阅读</div></th>'
             + '<th><div align="center">写作</div></th>'
             + '<th>\n\t\t\t\t\t\t<div align="center">\n\t\t\t\t\t\t\t\tTotal Score\n\t\t\t\t\t\t</div>\n\t\t\t\t\t\t</th>';
      hskTD = '<td align="center">\n\t\t\t\t\t\t\t' + s['HSK Listening'] + '\n\t\t\t\t\t\t</td>'

             + '\n\t\t\t\t\t\t\n\t\t\t\t\t\t<td align="center">\n\t\t\t\t\t\t\t' + s['HSK Total'] + '\n\t\t\t\t\t\t</td>';
    }

    if (hasHSKK) {
      hskKPanel = '\n\t\t\t<div class="panel panel-default">'

        + '\n\t\t\t\t\t\t\t'
        + '\n\t\t\t\t\t\t\t<td align="center">' + s['HSKK Total'] + '</td>'

        + '\n\t\t\t\t\t</tbody>'

      + '\n\t\t\t\t\t<tr>'
      + '\n\t\t\t\t\t\t<td class="active text-right">Ticket No.</td>'
      + '\n\t\t\t\t\t\t<td colspan="2">' + s['Ticket No.'] + '</td>'
      + '\n\t\t\t\t\t</tr>'
      + '\n\t\t\t\t\t<tr>'
      + '\n\t\t\t\t\t\t<td class="active text-right">证书编号</td>'
      + '\n\t\t\t\t\t\t<td colspan="2"> ' + s['Certificate No.'] + '</td>'
      + '\n\t\t\t\t\t</tr>'
      + '\n\t\t\t\t\t<tr>'
      + '\n\t\t\t\t\t\t<td class="active text-right">Test Type</td>'
      + '\n\t\t\t\t\t\t<td colspan="2">' + s['Test Type'] + '</td>'
      + '\n\t\t\t\t\t</tr>'
      + '\n\t\t\t\t\t'
      + '\n\t\t\t\t\t<tr>'
      + '\n\t\t\t\t\t\t<td class="active text-right">Test Time</td>'
      + '\n\t\t\t\t\t\t<td colspan="2">' + s['Test Time'] + '</td>'
      + '\n\t\t\t\t\t</tr>'
      + '\n\t\t\t\t</tbody>'
      + '\n\t\t\t</table>'
      + '\n\t\t</div>'
      + '\n\t\t'
      + '\n\t\t'
      + '\n\t\t<div class="panel panel-default">'
      + '\n\t\t\t<!-- Default panel contents -->'
      + '\n\t\t\t<div class="panel-body">'
      + '\n\t\t\t\t' + s['Test Type'] + '(' + s['Test Time'] + ')中文水平考试'
      + '\n\t\t\t</div>'
      + '\n\t\t\t<!-- Table -->'
      + '\n\t\t\t<table class="table table-bordered">'
      + '\n\t\t\t\t<thead>'
      + '\n\t\t\t\t\t<tr class="active">\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t' + hskTH
      + '\n\t\t\t\t\t</tr>'
      + '\n\t\t\t\t</thead>'
      + '\n\t\t\t\t<tbody>'
      + '\n\t\t\t\t\t<tr>'
      + '\n\t\t\t\t\t\t' + hskTD
      + '\n\t\t\t\t\t\t</td>'
      + '\n\t\t\t\t\t</tr>'
      + '\n\t\t\t\t</tbody>'
      + '\n\t\t\t</table>'
      + '\n\t\t\t'
      + '\n\t\t</div>'
      + '\n\t\t'
      + '\n\t\t<!-- 越南才显示 或者 能关联上口语的才显示 flag 代表关联上成绩 180 越南-->'
      + '\n\t\t'
      + '\n\t\t'
      + hskKPanel
      + '\n\t\t<center>'
      + '\n\t \t\t\t<h6>最终解释权归汉考国际所有</h6>'
      + '\n\t\t</center>'
      + '\n\t\t'
      + '\n\t</div>'
      + '\n</div>';
  }

  /* ── not found — same header, error body ── */
  function renderNotFound(zsid) {
    return '<center>'
      + '\n  <h2>中文考试成绩在线验证结果查询</h2>'
      + '\n  <h4>汉考国际教育科技（北京）有限公司（CTI）</h4>'
      + '\n</center>'
      + '\n<div class="panel panel-default">'
      + '\n\t<div class="well-lg" style="text-align:center;padding:40px 24px;">'
      + '\n\t\t<h3 style="color:#a94442;margin-bottom:16px;">未找到记录</h3>'
      + '\n\t\t<p style="font-size:15px;color:#555;">No score record found for candidate ID: <strong>' + (zsid || '') + '</strong></p>'
      + '\n\t\t<p style="font-size:13px;color:#999;">请确认准考证号是否正确 / Please verify the ID and try again.</p>'
      + '\n\t</div>'
      + '\n</div>';
  }

  /* ── MAIN ── */
  var zsid    = getParam('zsid');
  var student = zsid ? findStudent(zsid) : null;
  document.getElementById('app').innerHTML = student
    ? renderStudent(student)
    : renderNotFound(zsid);

})();
</script>
